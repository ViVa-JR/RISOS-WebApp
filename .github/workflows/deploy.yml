name: Build and Deploy RISOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Stažení kódu
        uses: actions/checkout@v4

      - name: Nastavení .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Instalace WASM nástrojů
        run: dotnet workload restore ./src/RISOS/RISOS.csproj

      - name: Sestavení projektu (dotnet publish)
        run: dotnet publish ./src/RISOS/RISOS.csproj -c Release -r linux-x64 --self-contained false -o ./publish-linux
      
      - name: Příprava SSH klíče
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}
      
      - name: Kopírování na server (Přímé SCP)
        run: scp -o StrictHostKeyChecking=no -r ./publish-linux/wwwroot/* ${{ secrets.USER }}@${{ secrets.HOST }}:~/WWW/risos/