name: Build and Deploy RISOS

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Stažení kódu
        uses: actions/checkout@v4

      - name: Nastavení .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Sestavení projektu (dotnet publish)
        run: dotnet publish ./src/RISOS/RISOS.csproj -c Release -r linux-x64 --self-contained false -o ./publish-linux

      - name: Kopírování na Merlin (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          password: ${{ secrets.PASSWORD }}
          port: 22
          source: "publish-linux/wwwroot/"
          target: "WWW/risos/"
          strip_components: 2