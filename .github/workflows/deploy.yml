name: Build and Deploy RISOS to GH Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

# Nezbytná práva pro publikování na GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    # Změněno ze self-hosted na veřejný runner (pro GH Pages ideální)
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Stažení kódu
        uses: actions/checkout@v4

      - name: Nastavení .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Instalace WASM nástrojů
        run: dotnet workload restore ./src/RISOS/RISOS.csproj

      - name: Sestavení projektu (dotnet publish)
        # Výstup rovnou směrujeme do publish-web
        run: dotnet publish ./src/RISOS/RISOS.csproj -c Release -o ./publish-web      

      - name: Přidání .nojekyll souboru
        # Zabrání ignorování složky _framework
        run: touch ./publish-web/wwwroot/.nojekyll

      - name: Úprava base href v index.html
        # Změní cesty k souborům, aby odpovídaly názvu vašeho repozitáře
        run: sed -i 's|<base href="/" />|<base href="/RISOS-WebApp/" />|g' ./publish-web/wwwroot/index.html

      - name: Příprava souborů pro GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: './publish-web/wwwroot'

      - name: Nasazení na GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
